
---
layout: default
---

<article class="post {{ page.note_type }}">

  <h1>{{ page.title }}</h1>

  <p class="post-meta">
    {{ page.date | date: "%B %d, %Y" }}
    {% if page.note_type %}
      · <span class="note-type">{{ page.note_type }}</span>
    {% endif %}
  </p>

  {{ content }}

</article>
