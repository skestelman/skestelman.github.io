<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} – {{ site.title }}</title>

  <!-- Open Graph / Social Media Preview -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:title" content="{{ page.title }} – {{ site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:image" content="{{ site.social_preview_image | absolute_url }}">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  {% if site.twitter_username %}<meta name="twitter:site" content="@{{ site.twitter_username }}">{% endif %}
  <meta name="twitter:title" content="{{ page.title }} – {{ site.title }}">
  <meta name="twitter:description" content="{{ page.description | default: site.description }}">
  <meta name="twitter:image" content="{{ site.social_preview_image | absolute_url }}">

<link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}">
</head>
<body>
<script src="{{ '/scale_fix.js' | relative_url }}"></script>

{% include header.html %}

<div class="wrapper">
  <div class="content">
    {{ content }}
  </div>
</div>

</body>
</html>
